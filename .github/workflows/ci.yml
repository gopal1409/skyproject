name: Enterprise DevSecOps Pipeline

on:
  pull_request:
    branches: [main]

jobs:

# -----------------------------
# Build Frontend
# -----------------------------

  frontend-build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build React
        run: |
          cd frontend
          npm install
          npm run build

# -----------------------------
# Build Backend
# -----------------------------

  backend-build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Spring Boot
        run: |
          cd backend
          ./mvnw clean package

# -----------------------------
# Build Docker Images
# -----------------------------

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]

    steps:

      - uses: actions/checkout@v4

      - name: Build Frontend Image
        run: |
          docker build -t frontend-image ./frontend

      - name: Build Backend Image
        run: |
          docker build -t backend-image ./backend

# -----------------------------
# Container Image Scan
# -----------------------------

  container-scan:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:

      - uses: actions/checkout@v4

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend-image
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend-image
          severity: CRITICAL,HIGH
          exit-code: 1

# -----------------------------
# Run Containers
# -----------------------------

  run-container:
    runs-on: ubuntu-latest
    needs: container-scan

    steps:

      - uses: actions/checkout@v4

      - name: Start Backend
        run: |
          docker run -d -p 8080:8080 backend-image

      - name: Start Frontend
        run: |
          docker run -d -p 3000:80 frontend-image

# -----------------------------
# DAST Testing
# -----------------------------

  dast-test:
    runs-on: ubuntu-latest
    needs: run-container

    steps:

      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.8.0
        with:
          target: "http://localhost:8080"

# -----------------------------
# Docker Login
# -----------------------------

  docker-login:
    runs-on: ubuntu-latest
    needs: dast-test

    steps:

      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

# -----------------------------
# Image Signing
# -----------------------------

  image-sign:
    runs-on: ubuntu-latest
    needs: docker-login

    steps:

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Frontend Image
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY frontend-image

      - name: Sign Backend Image
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY backend-image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}

# -----------------------------
# Push Image to DockerHub
# -----------------------------

  push-image:
    runs-on: ubuntu-latest
    needs: image-sign

    steps:

      - name: Tag Images
        run: |
          docker tag frontend-image ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          docker tag backend-image ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest