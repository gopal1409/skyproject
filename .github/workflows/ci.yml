name: Enterprise DevSecOps Pipeline

on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/frontend:latest
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/backend:latest

jobs:

# -----------------------------
# Build Frontend
# -----------------------------

  frontend-build:
    runs-on: ubuntu-latest
    #runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
         cd frontend 
         rm -rf node_modules
         rm -f package-lock.json 
         npm install
      - name: Build React
        run: |
          cd frontend
          npm install
          npm run build
# -----------------------------
# Build Backend
# -----------------------------

  backend-build:
    runs-on: ubuntu-latest
    #runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Spring Boot
        run: |
          cd backend
          mvn clean package
# -----------------------------
# Docker Build + Scan
# -----------------------------

  docker-build-scan:
    runs-on: ubuntu-latest
    #runs-on: self-hosted
    needs: [frontend-build, backend-build]

    steps:

      - uses: actions/checkout@v4

      # Build Images
      - name: Build Frontend Image
        run: docker build -t frontend-image ./frontend

      - name: Build Backend Image
        run: docker build -t backend-image ./backend

      # Install Trivy
      - uses: aquasecurity/setup-trivy@v0.2.0

      # Scan Images
      - name: Scan Frontend Image
        run: |
          trivy image --severity CRITICAL,HIGH,MEDIUM,LOW --format sarif -o trivy-results.sarif --exit-code 0 frontend-image
      - name: Scan Backend Image
        run: |
          trivy image --severity CRITICAL,HIGH,MEDIUM,LOW --format sarif -o trivy-results.sarif --exit-code 0 backend-image
      - name: Upload Trivy SARIF Results in security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      # Login DockerHub
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      # Tag Images
      - name: Tag Images
        run: |
          docker tag frontend-image $FRONTEND_IMAGE
          docker tag backend-image $BACKEND_IMAGE
      # Push Images
      - name: Push Images
        run: |
          docker push $FRONTEND_IMAGE
          docker push $BACKEND_IMAGE
# -----------------------------
# Pull Images and Run Containers
# -----------------------------

  run-container:
    runs-on: ubuntu-latest
    #runs-on: self-hosted
    needs: docker-build-scan

    steps:

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      - name: Pull Images
        run: |
          docker pull $FRONTEND_IMAGE
          docker pull $BACKEND_IMAGE
      - name: Run Backend
        run: |
          docker run -d -p 8080:8080 $BACKEND_IMAGE
          sleep 20
      - name: Run Frontend
        run: |
          docker run -d -p 3000:80 $FRONTEND_IMAGE
# -----------------------------
# DAST Scan
# -----------------------------

  dast-test:
    runs-on: ubuntu-latest
    needs: run-container
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # Build containers
      - name: Build containers
        run: docker compose build

      # Start services
      - name: Start application stack
        run: docker compose up -d

      # Wait until backend is ready
      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 5
          done
          echo "Backend failed to start"
          docker compose logs backend
          exit 1

      # Create report directory
      - name: Prepare ZAP report folder
        run: |
          mkdir -p zap-report
          chmod -R 777 zap-report

      # Run OWASP ZAP baseline scan
      - name: Run ZAP Scan
        run: |
          docker run \
            --network host \
            --user root \
            -v $(pwd)/zap-report:/zap/wrk/:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8080/api/enquiries \
            -r zap-report.html -I

      # Upload ZAP report
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report

      # Shutdown containers
      - name: Stop containers
        if: always()
        run: docker compose down

# -----------------------------
# Image Signing
# -----------------------------
  image-sign:
    runs-on: ubuntu-latest
    needs: dast-test

    permissions:
      contents: read
      id-token: write

    steps:

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Sign Backend Image
        run: |
          cosign sign --yes ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Sign Frontend Image
        run: |
          cosign sign --yes ${{ secrets.DOCKER_USERNAME }}/frontend:latest