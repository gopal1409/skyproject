name: Full Stack CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, closed]

jobs:
  # =============================
  # FRONTEND JOB
  # =============================
  frontend:
    name: React Frontend CI
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'closed'

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Install Test Framework (CI only)
        run: npm install --no-save vitest jsdom @testing-library/react

      - name: Run Unit Tests
        run: |
          if ls src/**/*.{test,spec}.{js,jsx,ts,tsx} 1> /dev/null 2>&1; then
            npx vitest run --coverage
          else
            echo "No test files found. Skipping frontend tests."
          fi

      - name: Build Frontend
        run: npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  # =============================
  # BACKEND JOB (SPRING BOOT)
  # =============================
  backend:
    name: Spring Boot Backend CI
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name != 'pull_request' || github.event.action != 'closed'

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Unit Tests
        run: mvn test

      - name: Build Backend
        run: mvn clean package -DskipTests

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar